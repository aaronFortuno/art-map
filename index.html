<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Map · PAU 2026</title>

  <meta name="description" content="Xarxa interactiva de les 55 obres canòniques d'Història de l'Art de les PAU 2026 (Catalunya) connectades per 5 tipus de relació pedagògica.">
  <meta name="theme-color" content="#1c1917">

  <link rel="icon" type="image/svg+xml" href="./favicon.svg">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Art Map · PAU 2026">
  <meta property="og:description" content="Xarxa interactiva de les 55 obres d'Història de l'Art de les PAU 2026 connectades per relacions pedagògiques.">
  <meta property="og:image" content="https://aaronfortuno.github.io/art-map/docs/screenshot.png">
  <meta property="og:url" content="https://aaronfortuno.github.io/art-map/">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
</head>
<body>
  <header>
    <button id="controls-toggle" class="hamburger" aria-label="Obrir menú">☰</button>
    <h1>Art Map</h1>
    <span class="subtitle">PAU 2026 · Història de l'Art</span>
    <span class="stats" id="stats"></span>
  </header>
  <div id="panel-backdrop" class="panel-backdrop"></div>

  <div class="layout">
    <aside class="panel controls">
      <section>
        <h3>Cerca</h3>
        <input type="search" id="search-input" placeholder="Títol, autor, període, tema..." autocomplete="off">
        <div id="search-count" class="search-count"></div>
      </section>
      <section>
        <h3>Disposició</h3>
        <div id="layout-modes">
          <label><input type="radio" name="layout-mode" value="network" checked> Xarxa (força)</label>
          <label><input type="radio" name="layout-mode" value="timeline"> Cronologia</label>
        </div>
      </section>
      <section>
        <h3>Filtres de connexió</h3>
        <div id="connection-filters"></div>
      </section>
      <section>
        <h3>Nodes</h3>
        <label><input type="checkbox" id="toggle-secondary" checked> Mostra obres secundàries</label>
      </section>
      <section>
        <h3>Llegenda</h3>
        <div class="legend">
          <div><span class="node-dot canonical"></span> Obra canònica PAU 2026</div>
          <div><span class="node-dot secondary"></span> Obra secundària (pont pedagògic)</div>
        </div>
      </section>
      <section>
        <h3>Accions</h3>
        <button id="fit-btn">Encaixa a la vista</button>
        <button id="relayout-btn">Reordena</button>
      </section>
      <section>
        <h3>Exportar a PDF</h3>
        <button id="print-pau-btn" title="Document amb una fitxa per a cada obra del temari PAU 2026.">Només PAU (55)</button>
        <button id="print-all-btn" title="Inclou també els 46 nodes pont secundaris.">Totes les fitxes (101)</button>
      </section>
    </aside>

    <main id="cy"></main>

    <aside class="panel detail" id="detail">
      <p class="placeholder">Passa el ratolí per sobre un node per previsualitzar el seu veïnat. Fes clic per fixar-lo i veure'n la fitxa.</p>
    </aside>
  </div>

  <div id="print-container" aria-hidden="true"></div>

  <div id="fullscreen" class="fs-hidden" aria-hidden="true">
    <button class="fs-close" aria-label="Tancar">&times;</button>
    <div class="fs-image-wrap">
      <img id="fs-img" src="" alt="">
      <figcaption id="fs-caption"></figcaption>
    </div>
    <aside class="fs-detail" id="fs-detail"></aside>
  </div>

  <script src="app.js"></script>
</body>
</html>
