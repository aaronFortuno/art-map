<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#f2eee3"/>
  <!-- Edges (subtle, behind nodes) -->
  <line x1="20" y1="22" x2="44" y2="34" stroke="#6b6458" stroke-width="1.6" opacity="0.55"/>
  <line x1="44" y1="34" x2="26" y2="50" stroke="#6b6458" stroke-width="1.6" opacity="0.55"/>
  <!-- Secondary node (gray, no border) -->
  <circle cx="26" cy="50" r="5" fill="#a39d92"/>
  <!-- Canonical satellite -->
  <circle cx="20" cy="22" r="6" fill="#1c1917" stroke="#b8860b" stroke-width="2"/>
  <!-- Canonical hub (bigger) -->
  <circle cx="44" cy="34" r="8.5" fill="#1c1917" stroke="#b8860b" stroke-width="2.5"/>
</svg>
